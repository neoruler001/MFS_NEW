<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFS 호출 그래프</title>
  <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/dist/vis-network.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/dist/vis-network.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────── */
    .hdr {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 9px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .hdr-title { font-size: .95rem; font-weight: 700; color: #f1f5f9; }
    .hdr-stats { color: #64748b; font-size: .78rem; }
    .hdr-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .back-link {
      text-decoration: none; color: #60a5fa; font-size: .75rem;
      display: flex; align-items: center; gap: 3px;
    }
    .back-link:hover { color: #93c5fd; }

    /* ── Controls ────────────────────────── */
    .ctrl {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 7px 16px;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .ctrl-lbl { font-size: .7rem; color: #64748b; margin-right: 2px; }
    .btn {
      padding: 3px 9px; border-radius: 4px; border: 1px solid #334155;
      background: transparent; color: #94a3b8; font-size: .72rem;
      cursor: pointer; transition: all .12s;
    }
    .btn:hover { border-color: #475569; color: #e2e8f0; }
    .btn.on { border-color: var(--c,#3b82f6); color: var(--c,#60a5fa); background: rgba(59,130,246,.1); }
    .btn-act {
      padding: 3px 11px; border-radius: 4px; border: 1px solid #475569;
      background: #0f172a; color: #cbd5e1; font-size: .72rem; cursor: pointer;
      transition: all .12s; margin-left: 4px;
    }
    .btn-act:hover { background: #1e293b; }
    .btn-hub { --c: #f59e0b; border-color: #92400e; color: #f59e0b; }
    .btn-hub:hover { background: rgba(245,158,11,.08); }
    .sep-v { width: 1px; height: 16px; background: #334155; margin: 0 4px; }

    /* ── Main layout ─────────────────────── */
    .main { display: flex; flex: 1; overflow: hidden; }

    #graph-wrap { flex: 1; position: relative; }

    /* ── Detail panel ────────────────────── */
    .panel {
      width: 268px; background: #1e293b;
      border-left: 1px solid #334155;
      display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
    }
    .panel-hdr {
      padding: 10px 14px; border-bottom: 1px solid #334155;
      font-size: .7rem; font-weight: 600; color: #64748b;
      text-transform: uppercase; letter-spacing: .06em; flex-shrink: 0;
    }
    .panel-body { padding: 14px; overflow-y: auto; flex: 1; }
    .ph { color: #475569; font-size: .78rem; text-align: center; margin-top: 48px; line-height: 1.6; }
    .d-name {
      font-size: .88rem; font-weight: 700; color: #f1f5f9;
      word-break: break-all; margin-bottom: 8px;
      font-family: 'JetBrains Mono', monospace;
    }
    .d-badge {
      display: inline-flex; align-items: center; padding: 2px 8px;
      border-radius: 20px; font-size: .68rem; font-weight: 600;
      margin-bottom: 12px; border: 1px solid; background: rgba(0,0,0,.3);
    }
    .d-section { margin-bottom: 14px; }
    .d-lbl { font-size: .65rem; color: #64748b; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
    .d-val { font-size: .78rem; color: #cbd5e1; word-break: break-all; }
    .d-mono {
      font-family: 'JetBrains Mono', monospace; font-size: .73rem;
      background: #0f172a; padding: 4px 8px; border-radius: 4px;
      border: 1px solid #334155; display: block;
    }
    .d-deg { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .d-bar-wrap {
      flex: 1; background: #0f172a; border-radius: 3px;
      height: 6px; border: 1px solid #334155; overflow: hidden;
    }
    .d-bar { height: 100%; border-radius: 3px; background: #3b82f6; transition: width .3s; }
    .d-num { font-size: .75rem; font-family: monospace; color: #94a3b8; width: 18px; }
    .caller-list { list-style: none; margin-top: 4px; }
    .caller-list li {
      font-size: .72rem; font-family: 'JetBrains Mono', monospace;
      color: #94a3b8; padding: 2px 0; cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .caller-list li:hover { color: #60a5fa; }
    .warn-tag {
      display: inline-block; background: rgba(239,68,68,.12); color: #f87171;
      border: 1px solid rgba(239,68,68,.3); border-radius: 4px;
      font-size: .68rem; padding: 2px 7px; margin-top: 6px;
    }

    /* ── Legend ──────────────────────────── */
    .legend {
      background: #1e293b; border-top: 1px solid #334155;
      padding: 6px 16px; display: flex; align-items: center;
      gap: 10px; flex-wrap: wrap; flex-shrink: 0;
    }
    .leg-lbl { font-size: .65rem; color: #64748b; text-transform: uppercase; letter-spacing: .05em; }
    .leg-item { display: flex; align-items: center; gap: 4px; font-size: .7rem; color: #94a3b8; }
    .leg-dot {
      width: 9px; height: 9px; border-radius: 50%;
      border: 2px solid; flex-shrink: 0;
    }
    .leg-dot.hub { width: 12px; height: 12px; border-width: 3px; }

    /* loading overlay */
    #loading {
      position: absolute; inset: 0; background: rgba(15,23,42,.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; z-index: 100; pointer-events: none;
      transition: opacity .4s;
    }
    .spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid #334155; border-top-color: #3b82f6;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: .8rem; color: #64748b; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────── -->
<div class="hdr">
  <span>💳</span>
  <span class="hdr-title">MFS 호출 그래프</span>
  <span class="hdr-stats">41 노드 · 51 엣지 · 허브 3개</span>
  <div class="hdr-right">

  </div>

<!-- ── Controls ────────────────────────────────── -->

  <button class="btn" data-grp="core_soap" style="--c:#fb923c">Core·SAP</button>
  <button class="btn" data-grp="core_security" style="--c:#fbbf24">Core·보안</button>
  <div class="sep-v"></div>
  <button class="btn btn-hub" id="btn-hub" data-grp="">★ 허브 강조</button>
  <div style="margin-left:auto;display:flex;gap:5px;">
    <button class="btn-act" id="btn-fit">🔍 전체 보기</button>
    <button class="btn-act" id="btn-phys">⚡ 물리 OFF</button>

</div>

<!-- ── Main ────────────────────────────────────── -->
<div class="main">

    <div id="loading">

  </div>

    </div>
  </div>
</div>

<!-- ── Legend ──────────────────────────────────── -->
<div class="legend">
  <span class="leg-lbl">범례</span>

</div>

// ═══════════════════════════════════════════════════
const GC = {
  api_auth:      { bg:"#1e3a5f", bd:"#3b82f6", hBg:"#1e40af", hBd:"#60a5fa", fc:"#dbeafe" },
  api_cards:     { bg:"#0c2a4a", bd:"#0891b2", hBg:"#155e75", hBd:"#22d3ee", fc:"#cffafe" },
  api_admin:     { bg:"#4a0d35", bd:"#db2777", hBg:"#831843", hBd:"#f472b6", fc:"#fce7f3" },
  api_other:     { bg:"#1a3020", bd:"#16a34a", hBg:"#14532d", hBd:"#4ade80", fc:"#dcfce7" },
  core_auth:     { bg:"#2d1b69", bd:"#7c3aed", hBg:"#4c1d95", hBd:"#a78bfa", fc:"#ede9fe" },
  core_mssql:    { bg:"#052e16", bd:"#059669", hBg:"#064e3b", hBd:"#34d399", fc:"#d1fae5" },
  core_soap:     { bg:"#431407", bd:"#ea580c", hBg:"#7c2d12", hBd:"#fb923c", fc:"#ffedd5" },
  core_security: { bg:"#422006", bd:"#b45309", hBg:"#78350f", hBd:"#fbbf24", fc:"#fef3c7" },
  db:            { bg:"#1e293b", bd:"#64748b", hBg:"#334155", hBd:"#94a3b8", fc:"#f1f5f9" },
  hub:           { bg:"#7f1d1d", bd:"#f59e0b", hBg:"#991b1b", hBd:"#fbbf24", fc:"#fef9c3" },
};

const SHORT = {
  login_for_access_token:"login", delegate_target_user:"delegate",
  read_card_usages:"read_usages", get_card_info:"card_info",
  get_work_list:"worklist", process_expenses:"process", cancel_expenses:"cancel",
  read_notices:"notices", read_budget:"budget", read_contacts:"contacts",
  list_admin_users:"users:list", create_admin_user:"users:create",
  update_admin_user:"users:update", delete_admin_user:"users:delete",
  list_admin_notices:"notices:list", create_internal_notice:"notices:create",
  update_internal_notice:"notices:update", delete_internal_notice:"notices:delete",
  list_admin_contacts:"contacts:list", create_internal_contact:"contacts:create",
  update_internal_contact:"contacts:update", delete_internal_contact:"contacts:delete",
  authenticate_mssql_user:"authenticate", get_mssql_user_info:"user_info",
  create_access_token:"create_token", get_current_user:"get_current_user",
  authenticate_user:"authenticate_user", verify_password:"verify_pwd",
  get_password_hash:"get_hash", get_mssql_connection:"get_mssql_conn",
  get_internal_notices:"mssql_notices", get_internal_contacts:"mssql_contacts",
  call_xfi00250:"XFI00250", call_xfi00260:"XFI00260", call_xfi00270:"XFI00270",
  call_xfi00280:"XFI00280", call_xfi00290:"XFI00290", call_xfi00310:"XFI00310",
  call_xfi00320:"XFI00320", _call_sap_soap:"_call_sap_soap", get_db:"get_db"
};

const GRP_BADGE = {
  api_auth:"#3b82f6", api_cards:"#0891b2", api_admin:"#db2777", api_other:"#16a34a",
  core_auth:"#7c3aed", core_mssql:"#059669", core_soap:"#ea580c",
  core_security:"#b45309", db:"#64748b"
};

// ═══════════════════════════════════════════════════
//  데이터 전처리
// ═══════════════════════════════════════════════════
function getGroup(id) {
  if (id.startsWith("api.auth."))         return "api_auth";
  if (id.startsWith("api.card_usage."))   return "api_cards";
  if (id.startsWith("api.admin."))        return "api_admin";
  if (id.startsWith("api."))              return "api_other";
  if (id.startsWith("core.auth."))        return "core_auth";
  if (id.startsWith("core.mssql."))       return "core_mssql";
  if (id.startsWith("core.soap_client.")) return "core_soap";
  if (id.startsWith("core.security."))    return "core_security";
  return "db";
}

function getShort(id) {
  const last = id.split(".").pop();
  return SHORT[last] || last;
}

// In-degree 계산
const inDeg = {}, outDeg = {};
RAW_EDGES.forEach(e => {
  inDeg[e.to]   = (inDeg[e.to]   || 0) + 1;
  outDeg[e.from] = (outDeg[e.from] || 0) + 1;
});
const maxDeg = Math.max(...Object.values(inDeg));

// Callers / callees 맵
const callers = {}, callees = {};
RAW_EDGES.forEach(e => {
  if (!callers[e.to])   callers[e.to]   = [];
  if (!callees[e.from]) callees[e.from] = [];
  callers[e.to].push(e.from);
  callees[e.from].push(e.to);
});

// ─── vis.js 노드 생성 ────────────────────────────
const visNodes = RAW_NODES.map(n => {
  const grp  = getGroup(n.id);
  const isHub = HUB_IDS.has(n.id);
  const isDead = n.note && n.note.includes("미사용");
  const c = isHub ? GC.hub : GC[grp];
  const deg = inDeg[n.id] || 0;
  const lbl = (isHub ? "★ " : "") + getShort(n.id);

  return {
    id: n.id,
    label: lbl,
    title: `<b>${n.id}</b>${n.method ? "<br><span style='color:#94a3b8'>"+n.method+"</span>" : ""}${n.desc ? "<br><em>"+n.desc+"</em>" : ""}`,
    value: deg + 1,
    group: grp,
    isHub,
    isDead,
    color: {
      background: c.bg,
      border: c.bd,
      highlight: { background: c.hBg, border: c.hBd },
      hover:      { background: c.hBg, border: c.hBd }
    },
    font: {
      color: isDead ? "#64748b" : c.fc,
      size: isHub ? 13 : 11,
      face: "monospace",
    },
    opacity: isDead ? 0.45 : 1,
    borderWidth: isHub ? 3 : 1.5,
    borderWidthSelected: isHub ? 4 : 3,
  };
});

// ─── vis.js 엣지 생성 ────────────────────────────
const visEdges = RAW_EDGES.map((e, i) => ({
  id: i,
  from: e.from,
  to: e.to,
  edgeType: e.type,
  dashes: e.type === "depends",
  color: {
    color:     e.type === "depends" ? "#475569" : "#334d70",
    highlight: e.type === "depends" ? "#64748b" : "#3b82f6",
    hover:     e.type === "depends" ? "#64748b" : "#3b82f6",
    opacity: 0.75,
  },
  width: 1.4,
  arrows: { to: { enabled: true, scaleFactor: 0.45 } },
  smooth: { type: "curvedCW", roundness: 0.1 },
}));

// ═══════════════════════════════════════════════════
//  vis.js Network 초기화
// ═══════════════════════════════════════════════════
const nodeDS = new vis.DataSet(visNodes);
const edgeDS = new vis.DataSet(visEdges);
const container = document.getElementById("graph-wrap");
const options = {
  nodes: {
    shape: "dot",
    scaling: { min: 14, max: 36, label: { enabled: false } },
    font: { size: 11, face: "monospace", color: "#cbd5e1" },
    shadow: { enabled: true, color: "rgba(0,0,0,0.6)", size: 8, x: 2, y: 3 },
  },
  edges: {
    width: 1.4,
    selectionWidth: 2.5,
    shadow: { enabled: false },
    smooth: { type: "dynamic" },
  },
  physics: {
    enabled: true,
    forceAtlas2Based: {
      gravitationalConstant: -45,
      centralGravity: 0.012,
      springLength: 130,
      springConstant: 0.06,
      damping: 0.5,
      avoidOverlap: 0.6,
    },
    solver: "forceAtlas2Based",
    stabilization: { enabled: true, iterations: 500, updateInterval: 30, fit: true },
    maxVelocity: 50,
    minVelocity: 0.75,
  },
  interaction: {
    hover: true,
    tooltipDelay: 150,
    navigationButtons: false,
    keyboard: false,
    zoomView: true,
    dragView: true,
    hideEdgesOnDrag: true,
    multiselect: false,
  },
  layout: { randomSeed: 42 },
};

const network = new vis.Network(container, { nodes: nodeDS, edges: edgeDS }, options);

// 안정화 완료 → loading 숨김, 물리 끄기
network.once("stabilizationIterationsDone", () => {
  const ld = document.getElementById("loading");
  ld.style.opacity = "0";
  setTimeout(() => ld.style.display = "none", 400);
  network.setOptions({ physics: { enabled: false } });
  physOn = false;
  document.getElementById("btn-phys").textContent = "⚡ 물리 ON";
});

// ═══════════════════════════════════════════════════
//  클릭 → 상세 패널
// ═══════════════════════════════════════════════════
network.on("click", params => {
  const panelBody = document.getElementById("panel-body");
  if (!params.nodes.length) {
    panelBody.innerHTML = '<div class="ph">노드를 클릭하면<br>상세 정보가 표시됩니다</div>';
    return;
  }
  const nid = params.nodes[0];
  const raw = RAW_NODES.find(n => n.id === nid);
  const grp = getGroup(nid);
  const isHub = HUB_IDS.has(nid);
  const deg = inDeg[nid] || 0;
  const odeg = outDeg[nid] || 0;
  const callerList = (callers[nid] || []).map(id =>
    `<li onclick="focusNode('${id}')" title="${id}">${getShort(id)}</li>`
  ).join("");
  const calleeList = (callees[nid] || []).map(id =>
    `<li onclick="focusNode('${id}')" title="${id}">${getShort(id)}</li>`
  ).join("");
  const badgeColor = isHub ? "#f59e0b" : GRP_BADGE[grp];

  panelBody.innerHTML = `
    <div class="d-name">${nid}</div>
    <div class="d-badge" style="color:${badgeColor};border-color:${badgeColor}">
      ${isHub ? "★ HUB" : grp.replace("_", "·")}
    </div>
    ${raw.note ? `<div class="warn-tag">⚠ ${raw.note}</div>` : ""}

    <div class="d-section" style="margin-top:10px">
      <div class="d-lbl">파일</div>
      <code class="d-mono">${raw.file || "—"}</code>
    </div>

    ${raw.method ? `
    <div class="d-section">
      <div class="d-lbl">엔드포인트</div>
      <code class="d-mono">${raw.method}</code>
    </div>` : ""}

    ${raw.desc ? `
    <div class="d-section">
      <div class="d-lbl">설명</div>
      <div class="d-val">${raw.desc}</div>
    </div>` : ""}

    <div class="d-section">
      <div class="d-lbl">In-degree (호출받는 수)</div>
      <div class="d-deg">
        <div class="d-bar-wrap"><div class="d-bar" style="width:${Math.round(deg/maxDeg*100)}%;background:${isHub?'#f59e0b':'#3b82f6'}"></div></div>
        <span class="d-num">${deg}</span>
      </div>
    </div>
    <div class="d-section">
      <div class="d-lbl">Out-degree (호출하는 수)</div>
      <div class="d-deg">
        <div class="d-bar-wrap"><div class="d-bar" style="width:${Math.round(odeg/maxDeg*100)}%;background:#8b5cf6"></div></div>
        <span class="d-num">${odeg}</span>
      </div>
    </div>

    ${deg > 0 ? `
    <div class="d-section">
      <div class="d-lbl">호출하는 함수 (${deg})</div>
      <ul class="caller-list">${callerList}</ul>
    </div>` : ""}

    ${odeg > 0 ? `
    <div class="d-section">
      <div class="d-lbl">호출되는 함수 (${odeg})</div>
      <ul class="caller-list">${calleeList}</ul>
    </div>` : ""}
  `;
});

// 노드 포커스 (패널 리스트 클릭)
window.focusNode = function(id) {
  network.selectNodes([id]);
  network.focus(id, { animation: { duration: 400, easingFunction: "easeInOutQuad" }, scale: 1.2 });
  network.emit("click", { nodes: [id], edges: [] });
};

// ═══════════════════════════════════════════════════
//  필터 버튼
// ═══════════════════════════════════════════════════
let activeGrp = "all";
let hubMode = false;

document.querySelectorAll(".btn[data-grp]").forEach(btn => {
  btn.addEventListener("click", () => {
    const grp = btn.dataset.grp;

    // 허브 강조 모드 토글
    if (btn.id === "btn-hub") {
      hubMode = !hubMode;
      btn.classList.toggle("on", hubMode);
      applyFilter(activeGrp);
      return;
    }

    // 일반 필터
    document.querySelectorAll(".btn[data-grp]:not(#btn-hub)").forEach(b => b.classList.remove("on"));
    btn.classList.add("on");
    activeGrp = grp;
    applyFilter(grp);
  });
});

function applyFilter(grp) {
  const updates = nodeDS.map(n => {
    let visible = true;
    if (hubMode && !HUB_IDS.has(n.id)) {
      // 허브와 직접 연결된 노드만 표시
      const connected = RAW_EDGES.some(e =>
        (HUB_IDS.has(e.from) && e.to === n.id) ||
        (HUB_IDS.has(e.to) && e.from === n.id)
      );
      visible = connected;
    }
    if (grp !== "all" && getGroup(n.id) !== grp) visible = false;

    return { id: n.id, hidden: !visible };
  });
  nodeDS.update(updates);
  network.fit({ animation: { duration: 350, easingFunction: "easeInOutQuad" } });
}

// ═══════════════════════════════════════════════════
//  기타 컨트롤
// ═══════════════════════════════════════════════════
document.getElementById("btn-fit").addEventListener("click", () => {
  network.fit({ animation: { duration: 500, easingFunction: "easeInOutQuad" } });
});

let physOn = false;
document.getElementById("btn-phys").addEventListener("click", () => {
  physOn = !physOn;
  network.setOptions({ physics: { enabled: physOn } });
  document.getElementById("btn-phys").textContent = physOn ? "⚡ 물리 OFF" : "⚡ 물리 ON";
});

// 더블클릭 → 포커스
network.on("doubleClick", params => {
  if (params.nodes.length) {
    network.focus(params.nodes[0], {
      animation: { duration: 400, easingFunction: "easeInOutQuad" },
      scale: 1.5,
    });
  }
});

// 엣지 호버 하이라이트
network.on("hoverEdge", params => {
  edgeDS.update([{ id: params.edge, width: 3 }]);
});
network.on("blurEdge", params => {
  edgeDS.update([{ id: params.edge, width: 1.4 }]);
});
</script>
</body>
</html>
