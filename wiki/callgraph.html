<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>MFS 함수 호출 그래프</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/dist/dist/vis-network.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: rgba(15, 23, 42, 0.95);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    header .subtitle {
      font-size: 13px;
      color: #64748b;
    }

    header a {
      margin-left: auto;
      color: #3b82f6;
      text-decoration: none;
      font-size: 13px;
    }

    .legend {
      display: flex;
      gap: 16px;
      padding: 10px 20px;
      background: rgba(15,23,42,0.8);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #94a3b8;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      gap: 8px;
      padding: 8px 20px;
      background: rgba(15,23,42,0.6);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls label {
      font-size: 12px;
      color: #64748b;
    }

    .filter-btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #94a3b8;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    .main-area {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #network-container {
      flex: 1;
      position: relative;
    }

    #network {
      width: 100%;
      height: 100%;
    }

    #info-panel {
      width: 300px;
      background: rgba(30, 41, 59, 0.95);
      border-left: 1px solid rgba(255,255,255,0.08);
      padding: 20px;
      overflow-y: auto;
      flex-shrink: 0;
      display: none;
    }

    #info-panel.visible { display: block; }

    #info-panel h3 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .info-row {
      margin-bottom: 10px;
    }

    .info-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 3px;
    }

    .info-value {
      font-size: 13px;
      color: #e2e8f0;
      word-break: break-all;
    }

    .info-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-endpoint { background: rgba(59,130,246,0.2); color: #93c5fd; }
    .badge-function { background: rgba(16,185,129,0.2); color: #6ee7b7; }
    .badge-dependency { background: rgba(245,158,11,0.2); color: #fcd34d; }
    .badge-hub { background: rgba(239,68,68,0.2); color: #fca5a5; }

    .connections-list {
      list-style: none;
      margin-top: 8px;
    }

    .connections-list li {
      font-size: 12px;
      color: #94a3b8;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .connections-list li:last-child { border-bottom: none; }

    .arrow-in { color: #6ee7b7; }
    .arrow-out { color: #93c5fd; }

    #close-panel {
      float: right;
      background: none;
      border: none;
      color: #64748b;
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      line-height: 1;
    }

    #close-panel:hover { color: #fff; }

    .stats-bar {
      padding: 6px 20px;
      background: rgba(15,23,42,0.8);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 12px;
      color: #64748b;
      flex-shrink: 0;
      display: flex;
      gap: 16px;
    }

    .stats-bar span { color: #3b82f6; font-weight: 600; }
  </style>
</head>

<script>
// ── 데이터 ──────────────────────────────────────────────────────────────────
const HUB_IDS = new Set([
  "core.auth.get_current_user",
  "core.mssql.get_mssql_connection",
  "core.soap_client._call_sap_soap"
]);

const DEAD_IDS = new Set([
  "core.auth.authenticate_user",
  "api.admin.check_admin"  // 실질 무효

const rawNodes = [
  // API 엔드포인트 — auth
  {id: "api.auth.login_for_access_token", type: "endpoint", file: "backend/app/api/auth.py", method: "POST /api/v1/auth/login", group: "auth"},
  {id: "api.auth.delegate_target_user", type: "endpoint", file: "backend/app/api/auth.py", method: "POST /api/v1/auth/delegate", group: "auth"},
  // API 엔드포인트 — card_usage
  {id: "api.card_usage.read_card_usages", type: "endpoint", file: "backend/app/api/card_usage.py", method: "GET /api/v1/cards/usages", group: "card"},
  {id: "api.card_usage.get_card_info", type: "endpoint", file: "backend/app/api/card_usage.py", method: "GET /api/v1/cards/card-info", group: "card"},

  {id: "api.card_usage.cancel_expenses", type: "endpoint", file: "backend/app/api/card_usage.py", method: "POST /api/v1/cards/cancel", group: "card"},
  // API 엔드포인트 — notice
  {id: "api.notice.read_notices", type: "endpoint", file: "backend/app/api/notice.py", method: "GET /api/v1/notices/notices", group: "notice"},
  // API 엔드포인트 — budget
  {id: "api.budget.read_budget", type: "endpoint", file: "backend/app/api/budget.py", method: "GET /api/v1/budget/budget", group: "budget"},
  // API 엔드포인트 — contact
  {id: "api.contact.read_contacts", type: "endpoint", file: "backend/app/api/contact.py", method: "GET /api/v1/contacts/list", group: "contact"},
  // API 엔드포인트 — admin
  {id: "api.admin.list_admin_users", type: "endpoint", file: "backend/app/api/admin.py", method: "GET /api/v1/admin/users", group: "admin"},
  {id: "api.admin.create_admin_user", type: "endpoint", file: "backend/app/api/admin.py", method: "POST /api/v1/admin/users", group: "admin"},
  {id: "api.admin.update_admin_user", type: "endpoint", file: "backend/app/api/admin.py", method: "PUT /api/v1/admin/users/{emp_no}", group: "admin"},
  {id: "api.admin.delete_admin_user", type: "endpoint", file: "backend/app/api/admin.py", method: "DELETE /api/v1/admin/users/{emp_no}", group: "admin"},
  {id: "api.admin.list_admin_notices", type: "endpoint", file: "backend/app/api/admin.py", group: "admin"},
  {id: "api.admin.create_internal_notice", type: "endpoint", file: "backend/app/api/admin.py", group: "admin"},
  {id: "api.admin.update_internal_notice", type: "endpoint", file: "backend/app/api/admin.py", group: "admin"},
  {id: "api.admin.delete_internal_notice", type: "endpoint", file: "backend/app/api/admin.py", group: "admin"},
  {id: "api.admin.list_admin_contacts", type: "endpoint", file: "backend/app/api/admin.py", group: "admin"},
  {id: "api.admin.create_internal_contact", type: "endpoint", file: "backend/app/api/admin.py", group: "admin"},
  {id: "api.admin.update_internal_contact", type: "endpoint", file: "backend/app/api/admin.py", group: "admin"},
  {id: "api.admin.delete_internal_contact", type: "endpoint", file: "backend/app/api/admin.py", group: "admin"},
  // 코어 — auth
  {id: "core.auth.authenticate_mssql_user", type: "function", file: "backend/app/core/mssql.py", group: "core-auth"},
  {id: "core.auth.get_mssql_user_info", type: "function", file: "backend/app/core/mssql.py", group: "core-auth"},
  {id: "core.auth.create_access_token", type: "function", file: "backend/app/core/auth.py", group: "core-auth"},
  {id: "core.auth.get_current_user", type: "function", file: "backend/app/core/auth.py", group: "core-auth"},

  // 코어 — security
  {id: "core.security.verify_password", type: "function", file: "backend/app/core/security.py", group: "core-security"},
  {id: "core.security.get_password_hash", type: "function", file: "backend/app/core/security.py", group: "core-security"},
  // 코어 — mssql

  {id: "core.mssql.get_internal_notices", type: "function", file: "backend/app/core/mssql.py", group: "core-mssql"},
  {id: "core.mssql.get_internal_contacts", type: "function", file: "backend/app/core/mssql.py", group: "core-mssql"},
  // 코어 — soap_client
  {id: "core.soap_client.call_xfi00250", type: "function", file: "backend/app/core/soap_client.py", group: "sap"},
  {id: "core.soap_client.call_xfi00260", type: "function", file: "backend/app/core/soap_client.py", group: "sap"},
  {id: "core.soap_client.call_xfi00270", type: "function", file: "backend/app/core/soap_client.py", group: "sap"},

  {id: "core.soap_client.call_xfi00320", type: "function", file: "backend/app/core/soap_client.py", group: "sap"},
  {id: "core.soap_client._call_sap_soap", type: "function", file: "backend/app/core/soap_client.py", group: "sap"},
  // DB
  {id: "db.session.get_db", type: "dependency", file: "backend/app/db/session.py", group: "db"},
];

const rawEdges = [
  {from: "api.auth.login_for_access_token", to: "core.auth.authenticate_mssql_user", type: "call"},
  {from: "api.auth.login_for_access_token", to: "core.auth.get_mssql_user_info", type: "call"},
  {from: "api.auth.login_for_access_token", to: "core.auth.create_access_token", type: "call"},
  {from: "api.auth.delegate_target_user", to: "core.auth.get_current_user", type: "depends"},
  {from: "api.auth.delegate_target_user", to: "core.auth.get_mssql_user_info", type: "call"},
  {from: "api.auth.delegate_target_user", to: "core.auth.create_access_token", type: "call"},
  {from: "api.card_usage.read_card_usages", to: "core.auth.get_current_user", type: "depends"},
  {from: "api.card_usage.read_card_usages", to: "core.soap_client.call_xfi00250", type: "call"},
  {from: "api.card_usage.get_card_info", to: "core.auth.get_current_user", type: "depends"},
  {from: "api.card_usage.get_card_info", to: "core.soap_client.call_xfi00250", type: "call"},
  {from: "api.card_usage.get_work_list", to: "core.auth.get_current_user", type: "depends"},
  {from: "api.card_usage.get_work_list", to: "core.soap_client.call_xfi00280", type: "call"},
  {from: "api.card_usage.process_expenses", to: "core.auth.get_current_user", type: "depends"},
  {from: "api.card_usage.process_expenses", to: "core.soap_client.call_xfi00260", type: "call"},
  {from: "api.card_usage.cancel_expenses", to: "core.auth.get_current_user", type: "depends"},
  {from: "api.card_usage.cancel_expenses", to: "core.soap_client.call_xfi00270", type: "call"},
  {from: "api.notice.read_notices", to: "core.auth.get_current_user", type: "depends"},
  {from: "api.notice.read_notices", to: "core.mssql.get_internal_notices", type: "call"},
  {from: "api.notice.read_notices", to: "core.soap_client.call_xfi00320", type: "call"},
  {from: "api.budget.read_budget", to: "core.auth.get_current_user", type: "depends"},
  {from: "api.budget.read_budget", to: "core.soap_client.call_xfi00290", type: "call"},
  {from: "api.contact.read_contacts", to: "core.auth.get_current_user", type: "depends"},
  {from: "api.contact.read_contacts", to: "core.mssql.get_internal_contacts", type: "call"},
  {from: "api.contact.read_contacts", to: "core.soap_client.call_xfi00310", type: "call"},
  {from: "api.admin.list_admin_users", to: "core.auth.get_current_user", type: "depends"},
  {from: "api.admin.list_admin_users", to: "core.mssql.get_mssql_connection", type: "call"},
  {from: "api.admin.create_admin_user", to: "core.auth.get_current_user", type: "depends"},
  {from: "api.admin.create_admin_user", to: "core.mssql.get_mssql_connection", type: "call"},
  {from: "api.admin.create_admin_user", to: "core.security.get_password_hash", type: "call"},
  {from: "api.admin.update_admin_user", to: "core.auth.get_current_user", type: "depends"},
  {from: "api.admin.update_admin_user", to: "core.mssql.get_mssql_connection", type: "call"},
  {from: "api.admin.update_admin_user", to: "core.security.get_password_hash", type: "call"},
  {from: "api.admin.delete_admin_user", to: "core.auth.get_current_user", type: "depends"},
  {from: "api.admin.delete_admin_user", to: "core.mssql.get_mssql_connection", type: "call"},
  {from: "api.admin.list_admin_notices", to: "core.mssql.get_mssql_connection", type: "call"},
  {from: "api.admin.create_internal_notice", to: "core.mssql.get_mssql_connection", type: "call"},
  {from: "api.admin.update_internal_notice", to: "core.mssql.get_mssql_connection", type: "call"},
  {from: "api.admin.delete_internal_notice", to: "core.mssql.get_mssql_connection", type: "call"},
  {from: "api.admin.list_admin_contacts", to: "core.mssql.get_mssql_connection", type: "call"},
  {from: "api.admin.create_internal_contact", to: "core.mssql.get_mssql_connection", type: "call"},
  {from: "api.admin.update_internal_contact", to: "core.mssql.get_mssql_connection", type: "call"},
  {from: "api.admin.delete_internal_contact", to: "core.mssql.get_mssql_connection", type: "call"},
  {from: "core.auth.authenticate_mssql_user", to: "core.mssql.get_mssql_connection", type: "call"},
  {from: "core.auth.authenticate_mssql_user", to: "core.security.verify_password", type: "call"},
  {from: "core.auth.get_mssql_user_info", to: "core.mssql.get_mssql_connection", type: "call"},
  {from: "core.auth.get_current_user", to: "db.session.get_db", type: "depends"},
  {from: "core.soap_client.call_xfi00250", to: "core.soap_client._call_sap_soap", type: "call"},
  {from: "core.soap_client.call_xfi00260", to: "core.soap_client._call_sap_soap", type: "call"},
  {from: "core.soap_client.call_xfi00270", to: "core.soap_client._call_sap_soap", type: "call"},
  {from: "core.soap_client.call_xfi00280", to: "core.soap_client._call_sap_soap", type: "call"},
  {from: "core.soap_client.call_xfi00290", to: "core.soap_client._call_sap_soap", type: "call"},
  {from: "core.soap_client.call_xfi00310", to: "core.soap_client._call_sap_soap", type: "call"},
  {from: "core.soap_client.call_xfi00320", to: "core.soap_client._call_sap_soap", type: "call"},
];

// ── 색상 및 노드 스타일 ──────────────────────────────────────────────────────
function getNodeStyle(node) {
  const isHub = HUB_IDS.has(node.id);
  const isDead = node.dead;

  if (isDead) {
    return {
      color: { background: '#1e293b', border: '#8b5cf6', highlight: { background: '#2d1f5e', border: '#a78bfa' } },
      borderWidth: 2,
      borderDashes: [4, 4],
      font: { color: '#8b5cf6' },
      size: 18
    };
  }

  if (isHub) {
    return {
      color: { background: '#7f1d1d', border: '#ef4444', highlight: { background: '#991b1b', border: '#f87171' } },
      borderWidth: 3,
      font: { color: '#fca5a5', bold: true },
      size: 32,
      shadow: { enabled: true, color: 'rgba(239,68,68,0.4)', size: 12 }
    };
  }

  if (node.type === 'endpoint') {
    return {
      color: { background: '#1e3a5f', border: '#3b82f6', highlight: { background: '#1e40af', border: '#60a5fa' } },
      borderWidth: 2,
      font: { color: '#93c5fd' },
      size: 20
    };
  }

  if (node.type === 'dependency') {
    return {
      color: { background: '#451a03', border: '#f59e0b', highlight: { background: '#78350f', border: '#fcd34d' } },
      borderWidth: 2,
      font: { color: '#fcd34d' },
      size: 18
    };
  }

  // function — SAP group
  if (node.group === 'sap') {
    return {
      color: { background: '#1a2e2a', border: '#10b981', highlight: { background: '#064e3b', border: '#34d399' } },
      borderWidth: 2,
      font: { color: '#6ee7b7' },
      size: 18
    };
  }

  // function — others
  return {
    color: { background: '#1e293b', border: '#334155', highlight: { background: '#334155', border: '#64748b' } },
    borderWidth: 1,
    font: { color: '#94a3b8' },
    size: 16
  };
}

function shortLabel(id) {
  const parts = id.split('.');
  return parts[parts.length - 1];
}

// ── 노드/엣지 생성 ───────────────────────────────────────────────────────────
const nodes = rawNodes.map(n => {
  const style = getNodeStyle(n);
  return {
    id: n.id,
    label: shortLabel(n.id),
    title: `<div style="max-width:280px;font-family:monospace;font-size:12px;">
      <b style="color:#fff">${n.id}</b><br>
      <span style="color:#64748b">${n.file || ''}</span><br>
      ${n.method ? `<span style="color:#3b82f6">${n.method}</span><br>` : ''}
      ${n.note ? `<span style="color:#fbbf24">⚠ ${n.note}</span>` : ''}
    </div>`,
    _raw: n,
    shape: n.type === 'dependency' ? 'diamond' : (HUB_IDS.has(n.id) ? 'star' : 'dot'),
    ...style
  };
});

const edges = rawEdges.map((e, i) => ({
  id: i,
  from: e.from,
  to: e.to,
  _type: e.type,
  color: {
    color: e.type === 'depends' ? 'rgba(245,158,11,0.4)' : 'rgba(148,163,184,0.25)',
    highlight: e.type === 'depends' ? '#f59e0b' : '#64748b'
  },
  dashes: e.type === 'depends',
  arrows: { to: { enabled: true, scaleFactor: 0.6 } },
  width: 1.5,
  smooth: { type: 'curvedCW', roundness: 0.1 }
}));

// ── vis-network 초기화 ───────────────────────────────────────────────────────
const container = document.getElementById('network');
const data = {
  nodes: new vis.DataSet(nodes),
  edges: new vis.DataSet(edges)
};

const options = {
  physics: {
    enabled: true,
    solver: 'forceAtlas2Based',
    forceAtlas2Based: {
      gravitationalConstant: -80,
      centralGravity: 0.01,
      springLength: 120,
      springConstant: 0.06,
      damping: 0.4,
      avoidOverlap: 0.8
    },
    stabilization: { iterations: 200, updateInterval: 10 }
  },
  interaction: {
    hover: true,
    tooltipDelay: 150,
    navigationButtons: true,
    keyboard: true,
    zoomView: true
  },
  layout: {
    improvedLayout: true
  },
  nodes: {
    borderWidth: 2,
    font: { size: 11, face: 'Segoe UI, system-ui, sans-serif' }
  },
  edges: {
    smooth: { type: 'dynamic' }
  }
};

const network = new vis.Network(container, data, options);

// 안정화 완료 후 physics 끄기
network.on('stabilizationIterationsDone', () => {
  network.setOptions({ physics: { enabled: false } });
});

// ── 노드 클릭 — 상세 패널 ────────────────────────────────────────────────────
network.on('click', params => {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    const node = rawNodes.find(n => n.id === nodeId);
    if (node) showNodeInfo(node, nodeId);
  } else {
    hidePanel();
  }
});

function showNodeInfo(node, nodeId) {
  const panel = document.getElementById('info-panel');
  const details = document.getElementById('node-details');

  const isHub = HUB_IDS.has(nodeId);
  const isDead = node.dead;

  // 연결된 엣지 분석
  const inEdges = rawEdges.filter(e => e.to === nodeId);
  const outEdges = rawEdges.filter(e => e.from === nodeId);

  let typeLabel = node.type;
  let badgeClass = 'badge-function';
  if (node.type === 'endpoint') badgeClass = 'badge-endpoint';
  if (node.type === 'dependency') badgeClass = 'badge-dependency';
  if (isHub) { typeLabel = '허브 함수'; badgeClass = 'badge-hub'; }

  details.innerHTML = `
    <div class="info-row">
      <div class="info-label">ID</div>
      <div class="info-value" style="font-family:monospace;font-size:11px">${nodeId}</div>
    </div>
    <div class="info-row">
      <div class="info-label">타입</div>
      <div class="info-value">
        <span class="info-badge ${badgeClass}">${typeLabel}</span>
        ${isDead ? '<span class="info-badge" style="background:rgba(139,92,246,0.2);color:#c4b5fd;margin-left:4px">데드 코드 후보</span>' : ''}
      </div>
    </div>
    <div class="info-row">
      <div class="info-label">파일</div>
      <div class="info-value" style="font-family:monospace;font-size:11px;color:#60a5fa">${node.file || '-'}</div>
    </div>
    ${node.method ? `<div class="info-row"><div class="info-label">메서드</div><div class="info-value" style="color:#34d399">${node.method}</div></div>` : ''}
    ${node.note ? `<div class="info-row"><div class="info-label">비고</div><div class="info-value" style="color:#fbbf24">${node.note}</div></div>` : ''}
    <div class="info-row">
      <div class="info-label">호출하는 곳 (in-degree: ${inEdges.length})</div>
      <ul class="connections-list">
        ${inEdges.length === 0 ? '<li style="color:#ef4444">없음 (진입점 또는 데드 코드)</li>' :
          inEdges.map(e => `<li><span class="arrow-in">→</span> ${e.from}</li>`).join('')}
      </ul>
    </div>
    <div class="info-row">
      <div class="info-label">호출하는 함수 (out-degree: ${outEdges.length})</div>
      <ul class="connections-list">
        ${outEdges.length === 0 ? '<li style="color:#64748b">없음 (리프 노드)</li>' :
          outEdges.map(e => `<li><span class="arrow-out">→</span> ${e.to}</li>`).join('')}
      </ul>
    </div>
  `;

  panel.classList.add('visible');
}

function hidePanel() {
  document.getElementById('info-panel').classList.remove('visible');
}

document.getElementById('close-panel').addEventListener('click', hidePanel);

// ── 필터 버튼 ────────────────────────────────────────────────────────────────
const filterGroups = {
  all: null,
  endpoint: ['auth', 'card', 'notice', 'budget', 'contact', 'admin'],
  core: ['core-auth', 'core-mssql', 'core-security'],
  sap: ['sap'],
  mssql: ['core-mssql', 'db']
};

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const filter = btn.dataset.filter;
    const groups = filterGroups[filter];

    const updatedNodes = rawNodes.map(n => {
      const visible = !groups || groups.includes(n.group);
      return { id: n.id, hidden: !visible };
    });

    data.nodes.update(updatedNodes);

    // 엣지 가시성: 양쪽 노드가 모두 보여야 함
    const visibleNodeIds = new Set(
      updatedNodes.filter(n => !n.hidden).map(n => n.id)
    );
    const updatedEdges = rawEdges.map((e, i) => ({
      id: i,
      hidden: !visibleNodeIds.has(e.from) || !visibleNodeIds.has(e.to)
    }));
    data.edges.update(updatedEdges);
  });
});

// ── 더블클릭 — 연결 강조 ─────────────────────────────────────────────────────
network.on('doubleClick', params => {
  if (params.nodes.length > 0) {
    const nodeId = params.nodes[0];
    const connectedEdges = network.getConnectedEdges(nodeId);
    const connectedNodes = network.getConnectedNodes(nodeId);

    // 전체 희미하게
    const allNodeUpdates = rawNodes.map(n => ({
      id: n.id,
      opacity: 0.15
    }));
    const allEdgeUpdates = rawEdges.map((e, i) => ({
      id: i,
      color: { color: 'rgba(100,116,139,0.08)' }
    }));

    data.nodes.update(allNodeUpdates);
    data.edges.update(allEdgeUpdates);

    // 선택된 노드 + 연결 강조
    data.nodes.update([{ id: nodeId, opacity: 1 }]);
    connectedNodes.forEach(nid => data.nodes.update([{ id: nid, opacity: 1 }]));
    connectedEdges.forEach(eid => data.edges.update([{
      id: eid,
      color: { color: '#3b82f6' }
    }]));
  }
});

// 빈 곳 클릭 — 강조 해제
network.on('click', params => {
  if (params.nodes.length === 0 && params.edges.length === 0) {
    // 전체 복원
    const allNodeUpdates = rawNodes.map(n => ({ id: n.id, opacity: 1 }));
    const allEdgeUpdates = rawEdges.map((e, i) => ({
      id: i,
      color: {
        color: e.type === 'depends' ? 'rgba(245,158,11,0.4)' : 'rgba(148,163,184,0.25)',
        highlight: e.type === 'depends' ? '#f59e0b' : '#64748b'
      }
    }));
    data.nodes.update(allNodeUpdates);
    data.edges.update(allEdgeUpdates);
    hidePanel();
  }
});
</script>
</body>
</html>
